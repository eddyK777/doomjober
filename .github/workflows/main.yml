name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Сохраняем наш код (только lib и pubspec)
      - name: Save source
        run: |
          mkdir tmp_src
          cp -r lib tmp_src/
          cp pubspec.yaml tmp_src/

      # Устанавливаем Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'

      # Создаём чистый проект
      - name: Create fresh Flutter project
        run: flutter create --project-name doomjober --org com.example .

      # Восстанавливаем наш код
      - name: Restore our code
        run: |
          cp -r tmp_src/lib ./
          cp tmp_src/pubspec.yaml ./

      # ПРАВИМ compileSdkVersion на 34 (чтобы не было ошибки)
      - name: Fix Android SDK version
        run: |
          sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]\+/targetSdkVersion 34/g' android/app/build.gradle

      # Получаем зависимости
      - run: flutter pub get

      # Собираем APK
      - run: flutter build apk --release --split-per-abi

      # Загружаем результат
      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-release
          path: build/app/outputs/apk/release/*.apk
